name: Build ARM64 + Docker

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-arm64:
    name: Compile & Push Docker (ARM64)
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-13 g++-13 curl zip unzip tar pkg-config git mono-complete

      - name: Get vcpkg baseline
        run: |
          vcpkgCommitId=$(grep '.builtin-baseline' vcpkg.json | awk -F: '{print $2}' | tr -d '," ')
          echo "VCPKG_GIT_COMMIT_ID=$vcpkgCommitId" >> "$GITHUB_ENV"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitURL: "https://github.com/microsoft/vcpkg.git"
          vcpkgGitCommitId: ${{ env.VCPKG_GIT_COMMIT_ID }}

      - name: CCache
        uses: hendrikmuhs/ccache-action@v1.2.20
        with:
          max-size: "2G"
          key: ccache-arm64-release

      - name: Configure CMake
        env:
          CC: gcc-13
          CXX: g++-13
          VCPKG_ROOT: ${{ env.RUNVCPKG_VCPKG_ROOT }}
        run: |
          cmake -S . -B build/release \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -G Ninja \
            -DTOGGLE_BIN_FOLDER=ON

      - name: Build
        run: cmake --build build/release --config Release --parallel $(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: canary-arm64-linux-release
          path: build/release/bin/
          retention-days: 30

      # --- Docker image ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker context
        run: |
          mkdir -p docker-ctx
          cp build/release/bin/canary docker-ctx/
          cp LICENSE *.sql key.pem docker-ctx/
          cp config.lua.dist docker-ctx/config.lua
          cp -r data docker-ctx/data
          cp -r data-canary docker-ctx/data-canary
          cp -r data-otservbr-global docker-ctx/data-otservbr-global
          cp -r docker/data docker-ctx/docker-data

      - name: Create runtime Dockerfile
        run: |
          cat > docker-ctx/Dockerfile <<'DOCKERFILE'
          FROM ubuntu:24.04
          ARG DEBIAN_FRONTEND=noninteractive
          ENV DEBIAN_FRONTEND=${DEBIAN_FRONTEND}
          ENV TZ=Etc/UTC

          RUN apt-get update && apt-get install -y --no-install-recommends \
              mariadb-client libluajit-5.1-dev libluajit-5.1-common \
              wget curl tzdata \
              && ln -snf "/usr/share/zoneinfo/${TZ}" /etc/localtime \
              && echo "${TZ}" > /etc/timezone \
              && apt-get clean && rm -rf /var/lib/apt/lists/*

          WORKDIR /canary
          VOLUME [ "/data" ]

          COPY canary /bin/canary
          COPY LICENSE *.sql key.pem /canary/
          COPY config.lua /canary/config.lua
          COPY data /canary/data
          COPY data-canary /canary/data-canary
          COPY data-otservbr-global /canary/data-otservbr-global
          COPY docker-data/01-test_account.sql /canary/01-test_account.sql
          COPY docker-data/02-test_account_players.sql /canary/02-test_account_players.sql
          COPY docker-data/start.sh /canary/start.sh

          RUN chmod +x /bin/canary /canary/start.sh

          EXPOSE 7171 7172

          ENTRYPOINT ["/canary/start.sh"]
          DOCKERFILE

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: docker-ctx
          file: docker-ctx/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/canary:latest
            ghcr.io/${{ github.repository_owner }}/canary:arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
